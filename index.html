<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suki | Personal Site</title>
  <meta name="build-version" content="5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css?v=5">
  <link rel="stylesheet" href="css/base.css?v=5">
  <link rel="stylesheet" href="css/components.css?v=5">
  <link rel="stylesheet" href="css/admin.css?v=5">
  <link rel="stylesheet" href="css/animations.css?v=5">
</head>
<body>
  <div id="skeleton-loader">
    <div class="skeleton-pulse skeleton-logo"></div>
    <div class="skeleton-pulse skeleton-bar"></div>
  </div>

  <div id="bg-layer">
    <video id="bg-media" muted loop playsinline></video>
    <canvas id="bg-canvas"></canvas>
  </div>

  <div id="enter-screen"></div>

  <div id="app">
    <nav id="main-nav" class="nav-bar"></nav>
    <div id="hero-section" class="hero-section"></div>
    <main id="tab-content"></main>
  </div>

  <div id="toast-container"></div>

  <!-- Bust cache for all ES module imports (relative imports don't inherit ?v= on app.js) -->
  <script type="importmap">
  {
    "scopes": {
      "/js/": {
        "./admin-owner.js": "/js/admin-owner.js?v=5",
        "./admin.js": "/js/admin.js?v=5",
        "./auth.js": "/js/auth.js?v=5",
        "./backgrounds.js": "/js/backgrounds.js?v=5",
        "./comments.js": "/js/comments.js?v=5",
        "./config.js": "/js/config.js?v=5",
        "./cursor.js": "/js/cursor.js?v=5",
        "./defaults.js": "/js/defaults.js?v=5",
        "./image-crop.js": "/js/image-crop.js?v=5",
        "./music-player.js": "/js/music-player.js?v=5",
        "./permissions.js": "/js/permissions.js?v=5",
        "./renderer.js": "/js/renderer.js?v=5",
        "./state.js": "/js/state.js?v=5",
        "./theme-engine.js": "/js/theme-engine.js?v=5",
        "./users.js": "/js/users.js?v=5",
        "./utils.js": "/js/utils.js?v=5",
        "./visitors.js": "/js/visitors.js?v=5"
      }
    }
  }
  </script>
  <script type="module" src="js/app.js?v=5"></script>
</body>
</html>
