<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suki | Creator Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/hub.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <!-- Enter gate -->
  <div id="enter-gate">
    <div class="enter-blur"></div>
    <div class="enter-inner">
      <p class="enter-main" id="enter-text"></p>
      <p class="enter-hint" id="enter-hint"></p>
    </div>
  </div>

  <div id="bg-layer"></div>

  <div id="app" class="app-hidden">
    <nav class="hub-nav" id="hub-nav"></nav>

    <main id="hub-main"></main>

    <footer class="hub-footer" id="hub-footer"></footer>

    <div class="music-bar" id="music-bar"></div>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="js/hub.js"></script>
</body>
</html>
